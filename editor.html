<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeOS 2D · Chão &amp; Paredes</title>
<style>
  :root{ color-scheme:dark; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; background:#14141c; color:#e8e8ee;
    font-family:"Segoe UI",system-ui,sans-serif; overflow:hidden; user-select:none; }
  #app{ display:flex; height:100%; }
  #side{ width:230px; flex:0 0 230px; background:#1c1c26; border-right:2px solid #000;
    display:flex; flex-direction:column; gap:10px; padding:12px; overflow-y:auto; }
  h1{ font-size:15px; color:#ffd36e; letter-spacing:1px; }
  .step{ font-size:12px; color:#aab; line-height:1.45; background:#26263a;
    border-left:3px solid #ffd36e; padding:7px 9px; border-radius:5px; }
  .grp{ font-size:11px; text-transform:uppercase; letter-spacing:1px; color:#8890a0; margin-top:4px; }
  .row{ display:grid; grid-template-columns:1fr 1fr; gap:7px; }
  button{ background:#2a2a38; color:#e8e8ee; border:1px solid #3a3a4a; border-radius:7px;
    padding:9px 6px; font-size:13px; cursor:pointer; }
  button:hover{ background:#34344a; }
  button.on{ background:#ffd36e; color:#20140a; border-color:#ffd36e; font-weight:700; }
  .palette{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .sw{ display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer;
    padding:6px 4px; border:2px solid #2e2e3e; border-radius:8px; background:#151520; }
  .sw.on{ border-color:#ffd36e; background:#26261c; }
  .sw canvas{ width:44px; height:44px; image-rendering:pixelated; border-radius:4px; }
  .sw span{ font-size:12px; color:#ccd; }
  .chars{ display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
  .ch{ cursor:pointer; border:2px solid #2e2e3e; border-radius:8px; background:#151520;
    display:flex; flex-direction:column; align-items:center; padding:5px 0 3px; }
  .ch.on{ border-color:#ffd36e; }
  .ch canvas{ width:32px; height:44px; image-rendering:pixelated; }
  .ch small{ font-size:9px; color:#bbc; }
  #stage{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; padding:14px; }
  #wrap{ position:relative; width:min(94%,820px); aspect-ratio:24/16;
    border:3px solid #000; border-radius:6px; box-shadow:0 10px 40px rgba(0,0,0,.6);
    overflow:hidden; background:#0c0c12; }
  canvas#game{ width:100%; height:100%; display:block; image-rendering:pixelated; cursor:crosshair; }
  #hud{ font-size:13px; color:#aab; text-align:center; min-height:18px; }
  kbd{ background:#33333f; border-radius:4px; padding:1px 6px; border:1px solid #55556a; font-size:12px; }
</style>
</head>
<body>
<div id="app">
  <div id="side">
    <h1>🧱 CHÃO &amp; PAREDES</h1>
    <div class="step" id="stepMsg"></div>

    <div class="grp">Ferramenta</div>
    <div class="row" id="tools">
      <button data-tool="floor" class="on">🟫 Piso</button>
      <button data-tool="wall">🧱 Parede</button>
      <button data-tool="erase">🧽 Apagar</button>
      <button data-tool="fill">🪣 Encher</button>
    </div>

    <div id="palBox">
      <div class="grp" id="palTitle">Pisos</div>
      <div class="palette" id="palette"></div>
    </div>

    <div class="grp">Personagem</div>
    <div class="chars" id="chars"></div>

    <div class="grp">Ações</div>
    <div class="row">
      <button id="btnPlay">▶ Jogar</button>
      <button id="btnSave">💾 Salvar</button>
      <button id="btnClear">🗑️ Limpar</button>
      <button id="btnGrid">▦ Grade</button>
    </div>
  </div>

  <div id="stage">
    <div id="wrap"><canvas id="game" width="384" height="256"></canvas></div>
    <div id="hud"></div>
  </div>
</div>

<script>
/* ============================================================
   LifeOS 2D — MÓDULO: CHÃO & PAREDES  (pacote Modern Interiors)
   Desenhe o piso e as paredes, escolha o personagem e clique
   em Jogar pra andar com colisão. Só este módulo por enquanto.
   ============================================================ */
const T=16, COLS=24, ROWS=16;
const canvas=document.getElementById('game'); const ctx=canvas.getContext('2d');
canvas.width=COLS*T; canvas.height=ROWS*T; ctx.imageSmoothingEnabled=false;

/* ---------- assets ---------- */
const IMG={}; const CHARS=['Adam','Alex','Amelia','Bob'];
const SRC={ rb:'assets/modern/Room_Builder_free_16x16.png' };
CHARS.forEach(c=>{ SRC[c+'_run']='assets/modern/'+c+'_run_16x16.png';
                   SRC[c+'_idle']='assets/modern/'+c+'_idle_16x16.png'; });

/* ---------- catálogos ---------- */
const FLOORS={
  mad_clara:{ label:'Madeira',  t:[0,12] },
  mad_esc:  { label:'Nogueira', t:[0,14] },
  mad_rust: { label:'Cerejeira',t:[0,16] },
  tijolo:   { label:'Tijolo',   t:[11,5] },
  ceramica: { label:'Cerâmica', t:[11,7] },
  azulejo:  { label:'Azulejo',  t:[11,9] },
  espinha:  { label:'Espinha',  t:[11,13] },
  cinza:    { label:'Cinza',    t:[11,11] },
};
const WALL_TILE=[15,1];   // branco sólido uniforme (tila em qualquer direção)

/* ---------- estado ---------- */
let house=blank();
function blank(){ return { floors:Array(COLS*ROWS).fill(null), walls:Array(COLS*ROWS).fill(false) }; }
const idx=(c,r)=>r*COLS+c; const inB=(c,r)=>c>=0&&c<COLS&&r>=0&&r<ROWS;
const isWall=(c,r)=> inB(c,r) ? house.walls[idx(c,r)] : true;   // fora do mapa = sólido

let tool='floor', selFloor='mad_clara', selChar='Adam', playing=false, showGrid=true;

/* ============================================================ UI */
const stepMsgs={
  floor:'Passo 1 — pinte o CHÃO. Clique e arraste pra desenhar os cômodos.',
  wall :'Passo 2 — levante as PAREDES. Arraste em linha; deixe vãos pras portas.',
  erase:'Borracha — remove parede ou piso da célula.',
  fill :'Balde — clique num piso pra preencher a área toda conectada.',
};
const stepEl=document.getElementById('stepMsg');
const palTitle=document.getElementById('palTitle'), paletteEl=document.getElementById('palette'), palBox=document.getElementById('palBox');
document.querySelectorAll('#tools button').forEach(b=>{ b.onclick=()=>{
  tool=b.dataset.tool;
  document.querySelectorAll('#tools button').forEach(x=>x.classList.toggle('on',x===b));
  stepEl.textContent=stepMsgs[tool]; palBox.style.display=(tool==='wall'||tool==='erase')?'none':'';
}; });
function mkThumb(w,h,fn){ const cv=document.createElement('canvas'); cv.width=w;cv.height=h;
  const cx=cv.getContext('2d'); cx.imageSmoothingEnabled=false; fn(cx); return cv; }
function buildPalette(){ paletteEl.innerHTML=''; palTitle.textContent='Pisos';
  for(const id in FLOORS){ const f=FLOORS[id], [c,r]=f.t;
    const el=document.createElement('div'); el.className='sw'+(id===selFloor?' on':'');
    el.appendChild(mkThumb(44,44,cx=>{ for(let a=0;a<3;a++)for(let b=0;b<3;b++)
      cx.drawImage(IMG.rb,c*T,r*T,T,T, b*15,a*15,15,15); }));
    const s=document.createElement('span'); s.textContent=f.label; el.appendChild(s);
    el.onclick=()=>{ selFloor=id; buildPalette(); }; paletteEl.appendChild(el);
  } }
function buildChars(){ const box=document.getElementById('chars'); box.innerHTML='';
  CHARS.forEach(name=>{ const el=document.createElement('div'); el.className='ch'+(name===selChar?' on':'');
    el.appendChild(mkThumb(32,44,cx=>{ const im=IMG[name+'_idle']; if(im) cx.drawImage(im,0,0,16,32,0,4,16,32); }));
    const s=document.createElement('small'); s.textContent=name; el.appendChild(s);
    el.onclick=()=>{ selChar=name; buildChars(); }; box.appendChild(el);
  }); }

/* ============================================================ RENDER */
function render(){
  ctx.fillStyle='#0c0c12'; ctx.fillRect(0,0,canvas.width,canvas.height);
  // piso
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){ const fid=house.floors[idx(c,r)];
    if(!fid) continue; const [fc,fr]=FLOORS[fid].t;
    ctx.drawImage(IMG.rb,fc*T,fr*T,T,T, c*T,r*T,T,T); }
  // sombra projetada das paredes no chão (dá altura)
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(isWall(c,r)&&inB(c,r+1)&&!isWall(c,r+1)){ ctx.fillStyle='rgba(0,0,0,.18)';
      ctx.fillRect(c*T,(r+1)*T,T,4); } }
  // paredes (tile uniforme + relevo por vizinhança)
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){ if(!house.walls[idx(c,r)]) continue;
    const x=c*T,y=r*T;
    ctx.drawImage(IMG.rb,WALL_TILE[0]*T,WALL_TILE[1]*T,T,T, x,y,T,T);
    if(!isWall(c,r-1)){ ctx.fillStyle='rgba(255,255,255,.18)'; ctx.fillRect(x,y,T,2); }
    if(!isWall(c,r+1)){ ctx.fillStyle='rgba(0,0,0,.30)';      ctx.fillRect(x,y+T-3,T,3); }
    if(!isWall(c-1,r)){ ctx.fillStyle='rgba(0,0,0,.12)';      ctx.fillRect(x,y,2,T); }
    if(!isWall(c+1,r)){ ctx.fillStyle='rgba(0,0,0,.12)';      ctx.fillRect(x+T-2,y,2,T); }
  }
  if(playing){ drawPlayer(); drawHUDbadge(); }
  else if(showGrid) drawGrid();
  if(!playing && hover.c>=0) drawCursor();
}
function drawGrid(){
  ctx.strokeStyle='rgba(255,255,255,.10)'; ctx.lineWidth=1;
  for(let c=0;c<=COLS;c++){ ctx.beginPath(); ctx.moveTo(c*T+.5,0); ctx.lineTo(c*T+.5,ROWS*T); ctx.stroke(); }
  for(let r=0;r<=ROWS;r++){ ctx.beginPath(); ctx.moveTo(0,r*T+.5); ctx.lineTo(COLS*T,r*T+.5); ctx.stroke(); }
  ctx.strokeStyle='rgba(255,211,110,.22)';
  for(let c=0;c<=COLS;c+=4){ ctx.beginPath(); ctx.moveTo(c*T+.5,0); ctx.lineTo(c*T+.5,ROWS*T); ctx.stroke(); }
  for(let r=0;r<=ROWS;r+=4){ ctx.beginPath(); ctx.moveTo(0,r*T+.5); ctx.lineTo(COLS*T,r*T+.5); ctx.stroke(); }
}
function drawCursor(){ const x=hover.c*T,y=hover.r*T;
  if(tool==='floor'||tool==='fill'){ const [fc,fr]=FLOORS[selFloor].t;
    ctx.globalAlpha=.55; ctx.drawImage(IMG.rb,fc*T,fr*T,T,T,x,y,T,T); ctx.globalAlpha=1; }
  ctx.strokeStyle=tool==='erase'?'#ff6b6b':'#ffd36e'; ctx.lineWidth=1.5;
  ctx.strokeRect(x+.5,y+.5,T-1,T-1); }

/* ============================================================ personagem */
const DIR={down:0,up:1,right:2,left:3};
function drawCharAt(cx,name,dir,moving,frame,footX,footY){
  const sheet=moving?IMG[name+'_run']:IMG[name+'_idle'];
  const col=moving? ([0,6,12,18][dir]+(frame%6)) : dir;
  cx.drawImage(sheet, col*16,0,16,32, Math.round(footX-8),Math.round(footY-27),16,32);
}

/* ============================================================ MODO JOGAR */
const player={ x:0,y:0,dir:0,moving:false,animT:0,speed:54 };
const keys={};
addEventListener('keydown',e=>{ const k=e.key.toLowerCase(); keys[k]=true;
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault(); });
addEventListener('keyup',e=>{ keys[e.key.toLowerCase()]=false; });

// caixa de colisão nos pés (~10x6)
function feetFree(px,py){ const hw=5;
  const pts=[[px-hw,py-4],[px+hw,py-4],[px-hw,py+3],[px+hw,py+3]];
  for(const [x,y] of pts){ if(isWall(Math.floor(x/T),Math.floor(y/T))) return false; }
  return true; }
function startPlay(){ let best=null,bd=1e9;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(house.floors[idx(c,r)]&&!isWall(c,r)){ const d=Math.hypot(c-COLS/2,r-ROWS/2);
      if(d<bd){bd=d;best=[c,r];} } }
  if(!best){ setHud('🟫 Desenhe o chão primeiro!'); return false; }
  player.x=best[0]*T+T/2; player.y=best[1]*T+T-2; player.dir=0; return true; }
function drawPlayer(){ drawCharAt(ctx,selChar,player.dir,player.moving,Math.floor(player.animT*10),player.x,player.y); }
function drawHUDbadge(){ ctx.fillStyle='rgba(0,0,0,.45)'; ctx.fillRect(0,0,88,13);
  ctx.fillStyle='#ffd36e'; ctx.font='8px monospace'; ctx.textAlign='left'; ctx.fillText('🎮 '+selChar,3,9); }

/* ============================================================ loop */
let last=performance.now();
function loop(now){ const dt=Math.min(.05,(now-last)/1000); last=now;
  if(playing) tick(dt); render(); requestAnimationFrame(loop); }
function tick(dt){
  let mx=0,my=0;
  if(keys['a']||keys['arrowleft'])mx-=1; if(keys['d']||keys['arrowright'])mx+=1;
  if(keys['w']||keys['arrowup'])my-=1;  if(keys['s']||keys['arrowdown'])my+=1;
  player.moving=(mx||my)!==0;
  if(player.moving){ const l=Math.hypot(mx,my)||1; mx/=l; my/=l;
    if(mx>0)player.dir=DIR.right; else if(mx<0)player.dir=DIR.left;
    else if(my>0)player.dir=DIR.down; else if(my<0)player.dir=DIR.up;
    const nx=player.x+mx*player.speed*dt, ny=player.y+my*player.speed*dt;
    if(feetFree(nx,player.y)) player.x=nx;
    if(feetFree(player.x,ny)) player.y=ny;
    player.animT+=dt;
  }
  setHud('WASD / setas pra andar  ·  esbarra nas paredes');
}

/* ============================================================ edição */
const hover={c:-1,r:-1}; let painting=false;
function cell(e){ const b=canvas.getBoundingClientRect();
  return { c:Math.floor((e.clientX-b.left)/b.width*canvas.width/T),
           r:Math.floor((e.clientY-b.top )/b.height*canvas.height/T) }; }
function apply(c,r){ if(!inB(c,r))return;
  if(tool==='floor') house.floors[idx(c,r)]=selFloor;
  else if(tool==='wall') house.walls[idx(c,r)]=true;
  else if(tool==='erase'){ if(house.walls[idx(c,r)])house.walls[idx(c,r)]=false; else house.floors[idx(c,r)]=null; } }
function floodFill(c,r){ if(!inB(c,r)) return; const target=house.floors[idx(c,r)];
  if(target===selFloor) return; const st=[[c,r]];
  while(st.length){ const [x,y]=st.pop(); if(!inB(x,y))continue;
    if(house.walls[idx(x,y)])continue; if(house.floors[idx(x,y)]!==target)continue;
    house.floors[idx(x,y)]=selFloor; st.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]); } }
canvas.addEventListener('mousedown',e=>{ if(playing)return; const {c,r}=cell(e); hover.c=c;hover.r=r;
  if(tool==='fill'){ floodFill(c,r); return; } painting=true; apply(c,r); });
canvas.addEventListener('mousemove',e=>{ if(playing)return; const {c,r}=cell(e); hover.c=c;hover.r=r;
  if(painting&&tool!=='fill') apply(c,r); });
addEventListener('mouseup',()=>painting=false);
canvas.addEventListener('mouseleave',()=>{hover.c=-1;painting=false;});

/* ============================================================ ações */
const hudEl=document.getElementById('hud'); const setHud=t=>hudEl.textContent=t;
const KEY='lifeos_house_v2';
document.getElementById('btnSave').onclick=()=>{ localStorage.setItem(KEY,JSON.stringify({house,selChar})); setHud('💾 Casa salva!'); };
document.getElementById('btnClear').onclick=()=>{ if(confirm('Apagar tudo?')) house=blank(); };
document.getElementById('btnGrid').onclick=(e)=>{ showGrid=!showGrid; e.target.classList.toggle('on',showGrid); };
const btnPlay=document.getElementById('btnPlay');
btnPlay.onclick=()=>{ if(!playing){ if(startPlay()){ playing=true; btnPlay.textContent='✎ Editar';
    btnPlay.classList.add('on'); canvas.style.cursor='default'; stepEl.textContent='Modo JOGAR — feche pra editar.'; } }
  else { playing=false; btnPlay.textContent='▶ Jogar'; btnPlay.classList.remove('on');
    canvas.style.cursor='crosshair'; stepEl.textContent=stepMsgs[tool]; setHud(''); } };

/* ============================================================ start */
function starter(){ const h=blank();
  for(let r=3;r<13;r++)for(let c=5;c<19;c++) h.floors[r*COLS+c]='mad_clara';
  for(let c=4;c<=19;c++){ h.walls[2*COLS+c]=true; h.walls[13*COLS+c]=true; }
  for(let r=2;r<=13;r++){ h.walls[r*COLS+4]=true; h.walls[r*COLS+19]=true; }
  h.walls[13*COLS+11]=false; h.walls[13*COLS+12]=false; // porta
  return h; }
function begin(){ ctx.imageSmoothingEnabled=false;
  const s=localStorage.getItem(KEY);
  if(s){ try{ const o=JSON.parse(s); if(o.house&&o.house.floors.length===COLS*ROWS){ house=o.house; selChar=o.selChar||'Adam'; } }catch(e){} }
  if(!house.floors.some(Boolean)) house=starter();
  stepEl.textContent=stepMsgs.floor; document.getElementById('btnGrid').classList.add('on');
  buildPalette(); buildChars(); requestAnimationFrame(loop); }
(function(){ let n=Object.keys(SRC).length;
  for(const k in SRC){ const im=new Image(); im.onload=im.onerror=()=>{ if(--n===0) begin(); };
    IMG[k]=im; im.src=SRC[k]; } })();
</script>
</body>
</html>
