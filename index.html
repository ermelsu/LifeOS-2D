<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>LifeOS · Entrar</title>
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="assets/favicon.svg">
<style>
  :root{ --bg:#0a0c14; --card:rgba(22,26,40,.72); --line:#2a3146; --ink:#eef1fa; --mut:#9aa2b8;
    --acc:#ffc94d; --acc-ink:#241802; --ok:#54d98c; color-scheme:dark; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{ font-family:"Segoe UI",system-ui,sans-serif; color:var(--ink); background:var(--bg);
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; overflow:hidden; position:relative; }

  /* ---------- arte de fundo (quase transparente) ---------- */
  .bg{ position:fixed; inset:0; z-index:0; overflow:hidden; }
  .orb{ position:absolute; border-radius:50%; filter:blur(70px); opacity:.30; animation:float 16s ease-in-out infinite; }
  .o1{ width:520px; height:520px; background:#6b4bff; left:-120px; top:-140px; }
  .o2{ width:460px; height:460px; background:#ff7b3a; right:-120px; top:10%; animation-delay:-4s; }
  .o3{ width:500px; height:500px; background:#2bb8a3; left:20%; bottom:-180px; animation-delay:-8s; }
  .o4{ width:360px; height:360px; background:#ff4d8d; right:12%; bottom:-120px; animation-delay:-12s; }
  @keyframes float{ 0%,100%{transform:translate(0,0)} 33%{transform:translate(30px,-24px)} 66%{transform:translate(-20px,20px)} }
  /* padrão de patinhas bem sutil */
  .paws{ position:absolute; inset:0; opacity:.05;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120' viewBox='0 0 120 120'><g fill='%23ffffff'><circle cx='30' cy='42' r='7'/><circle cx='18' cy='28' r='4.5'/><circle cx='30' cy='24' r='4.5'/><circle cx='42' cy='28' r='4.5'/><circle cx='92' cy='96' r='7'/><circle cx='80' cy='82' r='4.5'/><circle cx='92' cy='78' r='4.5'/><circle cx='104' cy='82' r='4.5'/></g></svg>"); }
  /* patinhas subindo */
  .drift{ position:absolute; bottom:-40px; font-size:26px; opacity:.10; animation:up linear infinite; }
  @keyframes up{ from{ transform:translateY(0) rotate(0) } to{ transform:translateY(-115vh) rotate(40deg) } }
  /* silhueta de casinha no rodapé */
  .house{ position:absolute; left:50%; bottom:0; transform:translateX(-50%); width:min(900px,96vw); opacity:.06; }

  /* ---------- cartão ---------- */
  .card{ position:relative; z-index:2; width:min(94vw,420px);
    background:var(--card); border:1px solid var(--line); border-radius:22px;
    padding:30px 26px 26px; backdrop-filter:blur(10px); box-shadow:0 24px 80px rgba(0,0,0,.55); text-align:center; }
  .logo{ font-size:44px; font-weight:900; letter-spacing:4px; color:var(--acc); line-height:1; text-shadow:0 4px 0 #0007, 0 0 34px #ffc94d55; }
  .logo small{ display:block; font-size:11px; letter-spacing:5px; color:var(--mut); font-weight:600; margin-top:8px; }
  .tag{ color:var(--mut); font-size:13px; margin:14px 0 22px; }
  .play{ width:100%; background:var(--acc); color:var(--acc-ink); font-weight:900; font-size:17px;
    border:none; border-radius:13px; padding:15px; cursor:pointer; box-shadow:0 8px 24px #ffc94d33; }
  .play:hover{ filter:brightness(1.05); }
  .field{ text-align:left; margin-bottom:12px; }
  .field label{ display:block; font-size:12px; color:var(--mut); margin-bottom:5px; }
  .field input{ width:100%; background:#0f1320; border:1px solid var(--line); color:var(--ink);
    border-radius:10px; padding:11px 12px; font:inherit; font-size:14px; }
  .field input:focus{ outline:none; border-color:var(--acc); }
  .go{ width:100%; background:#232a3d; color:var(--ink); border:1px solid var(--line); border-radius:11px;
    padding:12px; font:inherit; font-weight:700; cursor:pointer; }
  .go:hover{ background:#2c3348; }
  .actions{ display:flex; flex-direction:column; gap:10px; margin-top:4px; }
  .msg{ font-size:12px; min-height:16px; margin-top:10px; color:#ff8a8a; }
  .foot{ color:var(--mut); font-size:11px; margin-top:16px; line-height:1.5; }
  .foot a{ color:var(--acc); }

/* ==== interface maior ==== */

.tag{font-size:14.5px}
.tabs button{font-size:14.5px;padding:11px}
.field label{font-size:13px}
.field input{font-size:15.5px;padding:13px}
.go{font-size:15.5px;padding:14px}
.foot{font-size:12.5px}

</style>
</head>
<body>
  <div class="bg">
    <div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div><div class="orb o4"></div>
    <div class="paws"></div>
    <svg class="house" viewBox="0 0 900 260" fill="#ffffff" xmlns="http://www.w3.org/2000/svg">
      <path d="M120 260 V150 L210 90 L300 150 V260 Z"/><rect x="250" y="180" width="34" height="80"/>
      <path d="M360 260 V120 L480 40 L600 120 V260 Z"/><rect x="450" y="170" width="40" height="90"/>
      <rect x="400" y="150" width="34" height="30"/><rect x="520" y="150" width="34" height="30"/>
      <path d="M650 260 V160 L730 105 L810 160 V260 Z"/><rect x="705" y="195" width="30" height="65"/>
    </svg>
  </div>

  <div class="card">
    <div class="logo">LIFE OS<small>O JOGO DA SUA VIDA</small></div>
    <div class="tag">Transforme sua vida real num RPG: status, missões, sua casa e sua matilha.</div>

    <div class="form">
      <div class="field"><label>Nome de usuário</label><input id="u" autocomplete="username" placeholder="seu nome"></div>
      <div class="field"><label>Senha</label><input id="p" type="password" autocomplete="current-password" placeholder="••••••"></div>
      <div class="actions">
        <button class="play" id="btnLogin">▶ Entrar e jogar</button>
        <button class="go" id="btnReg">Criar conta</button>
      </div>
    </div>

    <div class="msg" id="msg"></div>
    <div class="foot">Novos jogadores preenchem o <a href="questionario.html">questionário</a> pra criar a ficha.<br>
      <span style="opacity:.7">🔒 Login local (só neste navegador, sem servidor) — protótipo.</span></div>
  </div>

<script src="js/index.js"></script>
</body>
</html>
