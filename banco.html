<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeOS · Banco</title>
<style>
  :root{ --bg:#0c0e16; --card:#161a28; --card2:#1b2032; --line:#2a3146; --ink:#e9ecf6; --mut:#8b93aa;
    --acc:#ffc94d; --acc-ink:#241802; --in:#54d98c; --out:#ff6b6b; --gold:#ffcf5c; color-scheme:dark; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:radial-gradient(120% 80% at 50% -10%,#1a2233,var(--bg) 65%); color:var(--ink);
    font-family:"Segoe UI",system-ui,sans-serif; min-height:100vh; padding:14px; }
  .app{ max-width:820px; margin:0 auto; }
  .top{ display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .top .brand{ font-weight:900; letter-spacing:1px; color:var(--acc); font-size:19px; } .top .sp{ flex:1; }
  a.back{ color:var(--mut); text-decoration:none; font-size:13px; } a.back:hover{ color:var(--ink); }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:16px; padding:16px; margin-bottom:14px; }

  .balance{ text-align:center; padding:8px 0 4px; }
  .balance .lbl{ color:var(--mut); font-size:12px; letter-spacing:1px; text-transform:uppercase; }
  .balance .val{ font-size:40px; font-weight:900; font-family:ui-monospace,monospace; margin:4px 0; }
  .sum{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  .pill{ font-family:ui-monospace,monospace; font-size:13px; border:1px solid var(--line); border-radius:20px; padding:6px 12px; }
  .pill.in{ color:var(--in); } .pill.out{ color:var(--out); }

  .form{ display:grid; grid-template-columns:1fr 120px auto; gap:8px; }
  @media(max-width:620px){ .form{ grid-template-columns:1fr 1fr; } .form .full{ grid-column:1/-1; } }
  input,select,button{ font:inherit; }
  input,select{ background:#0f1320; border:1px solid var(--line); color:var(--ink); border-radius:10px; padding:11px; font-size:14px; }
  input:focus,select:focus{ outline:none; border-color:var(--acc); }
  .seg{ display:flex; border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  .seg button{ flex:1; background:#0f1320; color:var(--mut); border:none; padding:10px; cursor:pointer; font-size:13px; }
  .seg button.on-in{ background:#153a29; color:var(--in); } .seg button.on-out{ background:#3a1717; color:var(--out); }
  .add{ background:var(--acc); color:var(--acc-ink); border:none; border-radius:10px; padding:0 16px; font-weight:800; cursor:pointer; }

  .tx{ display:flex; align-items:center; gap:11px; padding:11px 4px; border-bottom:1px dashed #232a3d; }
  .tx:last-child{ border-bottom:none; }
  .tx .ic{ width:36px; height:36px; border-radius:10px; background:var(--card2); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:18px; flex:0 0 auto; }
  .tx .info{ flex:1; min-width:0; } .tx .d{ font-weight:600; font-size:14px; } .tx .m{ color:var(--mut); font-size:12px; }
  .tx .v{ font-family:ui-monospace,monospace; font-weight:700; } .tx .v.in{ color:var(--in); } .tx .v.out{ color:var(--out); }
  .tx .x{ color:var(--mut); cursor:pointer; padding:2px 6px; } .tx .x:hover{ color:var(--out); }
  .empty{ color:var(--mut); text-align:center; padding:22px; font-size:13px; }
  h2{ font-size:13px; text-transform:uppercase; letter-spacing:.5px; color:#cdd4e6; margin-bottom:6px; }
</style>
</head>
<body>
<div class="app">
  <div class="top"><span class="brand">🏦 BANCO</span><span class="sp"></span><a class="back" href="painel.html">← voltar ao painel</a></div>

  <div class="card">
    <div class="balance">
      <div class="lbl">Saldo atual</div>
      <div class="val" id="saldo">R$ 0,00</div>
      <div class="sum">
        <span class="pill in" id="pin">▲ entradas R$ 0</span>
        <span class="pill out" id="pout">▼ saídas R$ 0</span>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Lançar movimento</h2>
    <div class="seg" style="margin-bottom:8px">
      <button id="bOut" class="on-out">▼ Gasto</button>
      <button id="bIn">▲ Entrada</button>
    </div>
    <div class="form">
      <input id="desc" class="full" placeholder="descrição (ex: ração da matilha)">
      <input id="val" type="number" step="0.01" inputmode="decimal" placeholder="R$ 0,00">
      <select id="cat"></select>
      <button class="add full" id="add">+ Adicionar</button>
    </div>
  </div>

  <div class="card">
    <h2>Movimentos</h2>
    <div id="list"><div class="empty">Nenhum movimento ainda. Lance seu primeiro gasto ou entrada.</div></div>
  </div>
</div>

<script>
  const KEY='lifeos_banco';
  let S=JSON.parse(localStorage.getItem(KEY)||'{"tx":[]}');
  let type='out';
  const CATS={ out:[['🛒','Mercado'],['🐾','Cães'],['🏠','Casa'],['🧾','Contas'],['🎮','Lazer'],['🚗','Transporte'],['💊','Saúde'],['📦','Outros']],
               in:[['💼','Salário'],['💻','Freela'],['🎁','Presente'],['📦','Outros']] };
  const save=()=>localStorage.setItem(KEY,JSON.stringify(S));
  const brl=v=>'R$ '+(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  const catIcon=(t,name)=>{ const f=(CATS[t]||[]).find(c=>c[1]===name); return f?f[0]:'📦'; };

  const bOut=document.getElementById('bOut'), bIn=document.getElementById('bIn'), catSel=document.getElementById('cat');
  function fillCats(){ catSel.innerHTML=CATS[type].map(c=>`<option value="${c[1]}">${c[0]} ${c[1]}</option>`).join(''); }
  function setType(t){ type=t; bOut.className=t==='out'?'on-out':''; bIn.className=t==='in'?'on-in':''; fillCats(); }
  bOut.onclick=()=>setType('out'); bIn.onclick=()=>setType('in');

  document.getElementById('add').onclick=()=>{
    const desc=document.getElementById('desc').value.trim(); const val=parseFloat(document.getElementById('val').value);
    if(!desc||!val||val<=0){ return; }
    S.tx.unshift({ id:Date.now(), d:new Date().toISOString(), desc, val:Math.abs(val), type, cat:catSel.value });
    save(); document.getElementById('desc').value=''; document.getElementById('val').value=''; render();
  };
  document.getElementById('val').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('add').click(); });

  function render(){
    let inSum=0,outSum=0;
    S.tx.forEach(t=> t.type==='in'? inSum+=t.val : outSum+=t.val);
    document.getElementById('saldo').textContent=brl(inSum-outSum);
    document.getElementById('saldo').style.color=(inSum-outSum)<0?'var(--out)':'var(--gold)';
    document.getElementById('pin').textContent='▲ entradas '+brl(inSum);
    document.getElementById('pout').textContent='▼ saídas '+brl(outSum);
    const list=document.getElementById('list');
    if(!S.tx.length){ list.innerHTML='<div class="empty">Nenhum movimento ainda. Lance seu primeiro gasto ou entrada.</div>'; return; }
    list.innerHTML=S.tx.map(t=>{ const dt=new Date(t.d).toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
      return `<div class="tx"><div class="ic">${catIcon(t.type,t.cat)}</div>
        <div class="info"><div class="d">${t.desc}</div><div class="m">${t.cat} · ${dt}</div></div>
        <div class="v ${t.type}">${t.type==='in'?'+':'−'}${brl(t.val)}</div>
        <div class="x" data-id="${t.id}">✕</div></div>`; }).join('');
    list.querySelectorAll('.x').forEach(x=>x.onclick=()=>{ S.tx=S.tx.filter(t=>t.id!=x.dataset.id); save(); render(); });
  }
  setType('out'); render();
</script>
</body>
</html>
