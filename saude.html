<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>LifeOS · Espelho da Saúde</title>
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="assets/favicon.svg">
<style>
  :root{ --ink:#eaf1f6; --mut:#9fb0bd; --acc:#ffc94d; --acc-ink:#241802; --ok:#54d98c; --dmg:#ff6b6b;
    --glass:#12202b; --line:#2c4150; color-scheme:dark; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:"Segoe UI",system-ui,sans-serif; color:var(--ink); min-height:100vh; padding:22px 14px;
    /* parede de azulejos do banheiro */
    background-color:#20343f;
    background-image:linear-gradient(#ffffff10 1px,transparent 1px),linear-gradient(90deg,#ffffff10 1px,transparent 1px),
      radial-gradient(120% 90% at 50% -10%,#2b4655,#16252e 70%);
    background-size:46px 46px,46px 46px,100% 100%; }
  .top{ max-width:900px; margin:0 auto 14px; display:flex; align-items:center; gap:10px; }
  .top .t{ font-weight:900; letter-spacing:2px; color:#dfeaf0; font-size:16px; }
  .top .sp{ flex:1; } .top a{ color:#bcd; text-decoration:none; font-size:13px; } .top a:hover{ color:#fff; }

  /* moldura do espelho */
  .mirror{ max-width:900px; margin:0 auto; border-radius:26px; padding:8px;
    background:linear-gradient(145deg,#3a4a55,#1a2730); box-shadow:0 30px 80px #0009, 0 2px 0 #ffffff22 inset; }
  .glass{ position:relative; border-radius:20px; overflow:hidden; padding:22px 20px 24px;
    background:linear-gradient(160deg,#1a2c38,#0e1a22 70%); }
  .glass::before{ content:""; position:absolute; top:-40%; left:-20%; width:70%; height:180%;
    background:linear-gradient(105deg,#ffffff14,transparent 60%); transform:rotate(8deg); pointer-events:none; }
  .glass::after{ content:""; position:absolute; right:14px; top:14px; width:70px; height:70px; border-radius:50%;
    background:radial-gradient(circle at 35% 35%,#ffffff22,transparent 60%); pointer-events:none; }

  .head{ display:flex; align-items:baseline; gap:10px; margin-bottom:4px; }
  .head h1{ font-size:22px; letter-spacing:1px; } .head .dt{ color:var(--mut); font-size:12px; margin-left:auto; font-family:ui-monospace,monospace; }
  .subtle{ color:var(--mut); font-size:13px; margin-bottom:18px; }

  .row{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  @media(max-width:680px){ .row{ grid-template-columns:1fr; } }
  .box{ background:#0e1a22aa; border:1px solid var(--line); border-radius:14px; padding:14px; }
  .box h2{ font-size:12px; text-transform:uppercase; letter-spacing:1px; color:#bcd; margin-bottom:12px; }

  /* humor */
  .moods{ display:flex; gap:8px; justify-content:space-between; }
  .moods button{ flex:1; font-size:26px; background:#0f1c24; border:1px solid var(--line); border-radius:12px; padding:8px 0; cursor:pointer; }
  .moods button.on{ border-color:var(--acc); background:#2a2617; }

  /* medidas */
  .meas{ margin:11px 0; } .meas .l{ display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px; }
  .meas .l b{ font-family:ui-monospace,monospace; } .meas .l b .g{ color:var(--mut); font-weight:400; }
  .track{ height:9px; background:#0b141a; border:1px solid var(--line); border-radius:20px; overflow:hidden; }
  .track > i{ display:block; height:100%; width:0; background:linear-gradient(90deg,#54d98c99,#54d98c); border-radius:20px; transition:width .9s; }

  /* água */
  .cups{ display:flex; gap:5px; flex-wrap:wrap; margin-bottom:10px; }
  .cup{ font-size:22px; filter:grayscale(1) opacity(.35); } .cup.on{ filter:none; }
  .wbtns{ display:flex; gap:8px; } .btn{ background:#1a2a34; color:var(--ink); border:1px solid var(--line); border-radius:10px; padding:8px 14px; font:inherit; cursor:pointer; } .btn:hover{ background:#22343f; }
  .btn.acc{ background:var(--acc); color:var(--acc-ink); font-weight:800; border:none; }

  /* registrar */
  .form{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .form label{ font-size:12px; color:var(--mut); display:block; margin-bottom:4px; }
  .form input{ width:100%; background:#0b141a; border:1px solid var(--line); color:var(--ink); border-radius:9px; padding:9px; font:inherit; }
  .form input:focus{ outline:none; border-color:var(--acc); }
  .full{ grid-column:1 / -1; }

  /* gráfico */
  .chartwrap{ position:relative; } .chartlbl{ color:var(--mut); font-size:12px; }
  svg{ display:block; width:100%; height:130px; }
  .msg{ color:var(--ok); font-size:12px; min-height:15px; margin-top:6px; }

/* ==== interface maior ==== */

body{font-size:16px}
.head h1{font-size:24px}.subtle{font-size:14px}.box h2{font-size:14px}
.moods button{font-size:30px;padding:11px 0}
.meas .l{font-size:14.5px}.form label{font-size:13px}.form input{font-size:14.5px;padding:10px}
.btn{font-size:15px;padding:11px 16px}.cup{font-size:26px}.chartlbl{font-size:13px}
.top .t{font-size:17px}.top a{font-size:14px}

</style>
</head>
<body>
  <div class="top">
    <span class="t">🪞 ESPELHO DA SAÚDE</span>
    <span class="sp"></span>
    <a href="painel.html">← voltar ao painel</a>
  </div>

  <div class="mirror"><div class="glass">
    <div class="head"><h1>Como você está hoje, Emerson?</h1><span class="dt" id="dt"></span></div>
    <div class="subtle">Seu reflexo do dia — registre e acompanhe sua evolução. 🐾</div>

    <div class="box" style="margin-bottom:14px">
      <h2>Humor de hoje</h2>
      <div class="moods" id="moods"></div>
    </div>

    <div class="row">
      <div class="box">
        <h2>Minhas medidas</h2>
        <div id="meas"></div>
        <div class="chartlbl" style="margin-top:2px">✎ toque em “Registrar” pra atualizar.</div>
      </div>

      <div class="box">
        <h2>Registrar medição de hoje</h2>
        <div class="form">
          <div><label>Peso (kg)</label><input id="i_peso" type="number" step="0.1" placeholder="ex: 92"></div>
          <div><label>Cintura (cm)</label><input id="i_cintura" type="number" step="0.5" placeholder="ex: 104"></div>
          <div><label>% Gordura</label><input id="i_gordura" type="number" step="0.1" placeholder="ex: 28"></div>
          <div><label>Sono (h)</label><input id="i_sono" type="number" step="0.5" placeholder="ex: 6.5"></div>
          <button class="btn acc full" id="save">💾 Salvar medição de hoje</button>
        </div>
        <div class="msg" id="msg"></div>
      </div>

      <div class="box">
        <h2>Água de hoje</h2>
        <div class="cups" id="cups"></div>
        <div class="wbtns"><button class="btn" id="wminus">−</button><button class="btn acc" id="wplus">+ copo</button>
          <span style="align-self:center;color:var(--mut);font-size:13px" id="wlbl"></span></div>
      </div>

      <div class="box chartwrap">
        <h2>Evolução do peso</h2>
        <div id="chart"></div>
      </div>
    </div>
  </div></div>

<script src="js/saude.js"></script>
</body>
</html>
