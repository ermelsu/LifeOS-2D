<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeOS · Painel</title>
<style>
  :root{
    --bg:#0c0e16; --bg2:#12151f; --card:#161a28; --card2:#1b2032; --line:#2a3146;
    --ink:#e9ecf6; --mut:#8b93aa; --acc:#ffc94d; --acc2:#ffb020;
    --hp:#54d98c; --mp:#5bb8ff; --gold:#ffcf5c; --dmg:#ff6b6b; --xp:#b98cff;
    color-scheme:dark;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:
      radial-gradient(120% 80% at 15% -10%, #1a2036, transparent 60%),
      radial-gradient(120% 80% at 100% 0%, #241a2e, transparent 55%),
      var(--bg);
    color:var(--ink); font-family:"Segoe UI",system-ui,sans-serif; min-height:100vh; padding:16px; }
  .app{ max-width:1180px; margin:0 auto; }

  /* topo */
  .topbar{ display:flex; align-items:center; gap:14px; padding:6px 4px 16px; flex-wrap:wrap; }
  .brand{ font-weight:900; letter-spacing:3px; font-size:22px; color:var(--acc); text-shadow:0 0 20px #ffc94d40; }
  .brand small{ display:block; font-size:10px; letter-spacing:3px; color:var(--mut); font-weight:600; }
  .topbar .sp{ flex:1; }
  .chip{ font-family:ui-monospace,monospace; font-size:13px; color:var(--ink); background:var(--card);
    border:1px solid var(--line); border-radius:20px; padding:6px 14px; }
  .chip b{ color:var(--acc); }
  .dot{ width:8px; height:8px; border-radius:50%; background:var(--hp); display:inline-block; margin-right:6px;
    box-shadow:0 0 8px var(--hp); animation:pulse 1.6s infinite; }
  @keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.35} }

  /* grid de painéis */
  .grid{ display:grid; grid-template-columns:repeat(12,1fr); gap:14px; }
  .panel{ background:linear-gradient(180deg,var(--card),var(--bg2)); border:1px solid var(--line);
    border-radius:16px; padding:14px 15px; position:relative; overflow:hidden; }
  .panel::before{ content:""; position:absolute; inset:0 0 auto 0; height:2px;
    background:linear-gradient(90deg,transparent,var(--acc),transparent); opacity:.5; }
  .ph{ display:flex; align-items:center; gap:8px; margin-bottom:12px; }
  .ph .ic{ font-size:18px; } .ph h2{ font-size:14px; letter-spacing:.5px; text-transform:uppercase; color:#cdd4e6; }
  .ph .r{ margin-left:auto; font-family:ui-monospace,monospace; font-size:12px; color:var(--mut); }
  .col-4{ grid-column:span 4; } .col-5{ grid-column:span 5; } .col-6{ grid-column:span 6; }
  .col-7{ grid-column:span 7; } .col-8{ grid-column:span 8; } .col-12{ grid-column:span 12; }
  @media(max-width:820px){ .grid{ grid-template-columns:repeat(6,1fr);} .col-4,.col-5,.col-6,.col-7,.col-8{ grid-column:span 6; } }

  /* personagem */
  .hero{ display:flex; gap:14px; align-items:center; }
  .avatar{ width:76px; height:76px; border-radius:14px; background:radial-gradient(circle at 50% 30%,#2b3350,#141828);
    border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:42px; flex:0 0 auto;
    animation:bob 2.4s ease-in-out infinite; }
  @keyframes bob{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  .hero .who{ flex:1; min-width:0; }
  .hero .name{ font-size:20px; font-weight:800; }
  .hero .cls{ color:var(--mut); font-size:13px; margin-bottom:8px; }
  .xp{ height:10px; background:#0e1220; border:1px solid var(--line); border-radius:20px; overflow:hidden; }
  .xp > i{ display:block; height:100%; width:0; border-radius:20px;
    background:linear-gradient(90deg,#8a5bff,var(--xp)); transition:width 1.1s ease; }
  .xp-lbl{ display:flex; justify-content:space-between; font-size:11px; color:var(--mut); margin-top:3px; font-family:ui-monospace,monospace; }
  .lvl{ background:var(--acc); color:#241802; font-weight:900; border-radius:10px; padding:4px 9px; font-size:13px; }

  /* medidores de atributo */
  .attrs{ display:grid; grid-template-columns:1fr 1fr; gap:9px 16px; margin-top:14px; }
  .attr .top{ display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px; }
  .attr .top b{ font-weight:600; } .attr .top span{ font-family:ui-monospace,monospace; color:var(--mut); }
  .bar{ height:9px; background:#0e1220; border:1px solid var(--line); border-radius:20px; overflow:hidden; }
  .bar > i{ display:block; height:100%; width:0; border-radius:20px; transition:width 1s ease; }
  @media(max-width:560px){ .attrs{ grid-template-columns:1fr; } }

  /* mini stat bars (dogs) */
  .mini{ display:flex; align-items:center; gap:7px; font-size:11px; margin:3px 0; }
  .mini .k{ width:56px; color:var(--mut); } .mini .bar{ flex:1; height:7px; }

  .dog{ display:flex; gap:11px; background:var(--card2); border:1px solid var(--line); border-radius:12px; padding:9px 11px; margin-bottom:9px; }
  .dog .face{ font-size:30px; align-self:center; animation:wag 1.8s ease-in-out infinite; }
  @keyframes wag{ 0%,100%{transform:rotate(-6deg)} 50%{transform:rotate(6deg)} }
  .dog .info{ flex:1; } .dog .nm{ font-weight:700; font-size:14px; margin-bottom:2px; }

  /* cômodos */
  .rooms{ display:grid; grid-template-columns:repeat(auto-fill,minmax(96px,1fr)); gap:9px; }
  .room{ background:var(--card2); border:1px solid var(--line); border-radius:12px; padding:10px; text-align:center; }
  .room .ic{ font-size:24px; } .room .nm{ font-size:12px; margin:4px 0 6px; color:#cdd4e6; }
  .room .bar{ height:6px; }

  /* inventário */
  .inv{ display:grid; grid-template-columns:repeat(auto-fill,minmax(52px,1fr)); gap:8px; }
  .slot{ aspect-ratio:1; border-radius:11px; border:1px solid var(--line); background:#0f1320;
    display:flex; align-items:center; justify-content:center; font-size:24px; position:relative; }
  .slot.empty{ border-style:dashed; color:#39415a; }
  .slot .q{ position:absolute; right:3px; bottom:1px; font-size:10px; font-family:ui-monospace,monospace; color:var(--mut); }

  /* missões */
  .quest{ display:flex; align-items:center; gap:10px; padding:8px 4px; border-bottom:1px dashed #232a3d; cursor:pointer; }
  .quest:last-child{ border-bottom:none; }
  .box{ width:18px; height:18px; border:2px solid var(--line); border-radius:6px; flex:0 0 auto; display:flex; align-items:center; justify-content:center; font-size:12px; }
  .quest.done .box{ background:var(--hp); border-color:var(--hp); color:#06210f; }
  .quest.done .txt{ color:var(--mut); text-decoration:line-through; }
  .quest .rw{ margin-left:auto; font-size:11px; color:var(--acc); font-family:ui-monospace,monospace; }

  .gold-big{ font-size:26px; font-weight:900; color:var(--gold); font-family:ui-monospace,monospace; }
  .sub{ color:var(--mut); font-size:12px; }
  .boss{ display:flex; align-items:center; gap:10px; }
  .boss .hpwrap{ flex:1; } .boss .face2{ font-size:30px; }
  .note{ text-align:center; color:var(--mut); font-size:12px; margin:18px 0 4px; }
  .note b{ color:var(--acc); }
  /* listas de itens (geladeira/despensa/eletro) */
  .list .li{ display:flex; align-items:center; gap:9px; padding:6px 2px; border-bottom:1px dashed #232a3d; font-size:13px; }
  .list .li:last-child{ border-bottom:none; }
  .list .li .ic{ font-size:17px; } .list .li .q{ margin-left:auto; font-family:ui-monospace,monospace; font-size:12px; color:var(--mut); }
  .sdot{ width:9px; height:9px; border-radius:50%; margin-left:auto; }
  /* medidas */
  .meas{ display:flex; align-items:center; gap:10px; margin:9px 0; }
  .meas .ic{ font-size:17px; width:20px; text-align:center; } .meas .mid{ flex:1; min-width:0; }
  .meas .nm{ display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px; }
  .meas .nm .cur{ font-family:ui-monospace,monospace; } .meas .nm .cur b{ color:var(--acc); } .meas .nm .cur .g{ color:var(--mut); }
  .meas .wk{ font-family:ui-monospace,monospace; font-size:11px; min-width:34px; text-align:right; color:var(--hp); }
  /* treino */
  .wo .exi{ display:flex; align-items:center; gap:9px; padding:6px 2px; border-bottom:1px dashed #232a3d; font-size:13px; }
  .wo .exi:last-child{ border-bottom:none; } .wo .exi .s{ margin-left:auto; font-family:ui-monospace,monospace; font-size:12px; color:var(--acc); }
  .wbtn{ width:100%; margin-top:11px; padding:11px; border-radius:10px; border:none; font-weight:800; cursor:pointer; background:var(--acc); color:var(--acc-ink); }
  .wbtn.done{ background:var(--hp); color:#06210f; }
  /* receitas */
  .recs{ display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px; }
  .rec{ background:var(--card2); border:1px solid var(--line); border-radius:12px; padding:11px; }
  .rec .rn{ font-weight:700; font-size:13.5px; margin-bottom:6px; padding-right:54px; position:relative; }
  .rec .tag{ position:absolute; right:0; top:0; font-size:11px; }
  .rec .ing{ font-size:19px; letter-spacing:3px; margin-bottom:9px; }
  .rec .mac{ display:flex; gap:7px; font-family:ui-monospace,monospace; font-size:11px; }
  .rec .mac span{ background:#0f1320; border:1px solid var(--line); border-radius:6px; padding:2px 7px; }
  /* humor */
  .mtoday{ text-align:center; margin-bottom:10px; } .mtoday .big{ font-size:38px; line-height:1; }
  .mtoday .lbl{ color:var(--mut); font-size:12px; margin-top:2px; }
  .mweek{ display:flex; gap:6px; align-items:flex-end; }
  .mday{ flex:1; text-align:center; } .mday .track{ height:48px; background:#0f1320; border:1px solid var(--line); border-radius:8px; display:flex; align-items:flex-end; overflow:hidden; }
  .mday .fill{ width:100%; background:linear-gradient(180deg,#ffd36e,#ff9f5b); transition:height 1s ease; }
  .mday .e{ font-size:15px; margin-top:3px; } .mday .d{ font-size:9px; color:var(--mut); }
  .mpick{ display:flex; gap:6px; justify-content:center; margin-top:10px; }
  .mpick button{ font-size:20px; background:#0f1320; border:1px solid var(--line); border-radius:9px; padding:3px 7px; cursor:pointer; }
  .mpick button.on{ border-color:var(--acc); background:#2a2617; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">LIFEOS<small>PAINEL DE CONTROLE DA VIDA</small></div>
    <span class="sp"></span>
    <span class="chip"><span class="dot"></span>ONLINE</span>
    <span class="chip">DIA <b id="day">1</b></span>
    <span class="chip" id="clock">00:00:00</span>
  </div>

  <div class="grid" id="grid"></div>

  <div class="note">Tela de exemplo — quando você terminar o <a href="questionario.html" style="color:var(--acc)"><b>questionário</b></a>, troco tudo pelos seus dados reais.</div>
</div>

<script>
/* ============================================================
   Estado do jogo (EXEMPLO). Troque pelos dados reais depois.
   ============================================================ */
const STATE = {
  hero:{ name:'Bob', cls:'Empreendedor · cap. Reconstrução', level:3, xp:62, xpMax:100, avatar:'🧑🏻' },
  attrs:[
    {n:'Corpo',    ic:'💪', v:6, c:'#54d98c'},
    {n:'Mente',    ic:'🧠', v:5, c:'#5bb8ff'},
    {n:'Recursos', ic:'💰', v:4, c:'#ffcf5c'},
    {n:'Ofício',   ic:'⚒️', v:7, c:'#ff9f5b'},
    {n:'Vínculos', ic:'❤️', v:6, c:'#ff7b9c'},
    {n:'Sabedoria',ic:'📚', v:7, c:'#b98cff'},
    {n:'Espírito', ic:'🔥', v:5, c:'#ffa24d'},
    {n:'Disciplina',ic:'⏳',v:4, c:'#7ee0d0'},
  ],
  gold:{ amount:1240, renda:'salário + freela', delta:'+180 / semana' },
  dogs:[
    {nm:'Cachorro 1', face:'🐕', fome:8, energia:6, feliz:9},
    {nm:'Cachorro 2', face:'🐩', fome:5, energia:7, feliz:8},
  ],
  rooms:[
    {nm:'Cozinha',  ic:'🍳', v:7}, {nm:'Sala',   ic:'🛋️', v:8},
    {nm:'Quarto',   ic:'🛏️', v:6}, {nm:'Banheiro',ic:'🚿', v:9},
    {nm:'Escritório',ic:'💻', v:5}, {nm:'Quintal', ic:'🌳', v:7},
  ],
  inv:[ {ic:'☕',q:''},{ic:'📱',q:''},{ic:'🎧',q:''},{ic:'💊',q:'x3'},{ic:'🔑',q:''},{ic:'📖',q:'x2'},{ic:'💧',q:'x5'} ],
  invSlots:14,
  fridge:[ {ic:'🥛',nm:'Leite',q:'1L'},{ic:'🥚',nm:'Ovos',q:'x8'},{ic:'🧀',nm:'Queijo',q:''},
    {ic:'🍗',nm:'Frango',q:'500g'},{ic:'🥦',nm:'Brócolis',q:''},{ic:'🧈',nm:'Manteiga',q:''} ],
  pantry:[ {ic:'🍚',nm:'Arroz',q:'2kg'},{ic:'🫘',nm:'Feijão',q:'1kg'},{ic:'🍝',nm:'Macarrão',q:'x3'},
    {ic:'☕',nm:'Café',q:'250g'},{ic:'🧂',nm:'Sal',q:''},{ic:'🫒',nm:'Azeite',q:''} ],
  appliances:[ {ic:'🍳',nm:'Fogão',ok:true},{ic:'🧊',nm:'Geladeira',ok:true},{ic:'♨️',nm:'Microondas',ok:true},
    {ic:'🧺',nm:'Máq. de lavar',ok:false},{ic:'📺',nm:'TV',ok:true},{ic:'💻',nm:'Notebook',ok:true} ],
  shopping:[ {t:'Peito de frango',done:false},{t:'Ovos',done:false},{t:'Aveia',done:true},
    {t:'Ração dos cães',done:false},{t:'Legumes',done:false} ],
  goal:'🔥 Perder peso & ganhar massa',
  measures:[
    {nm:'Peso',            ic:'⚖️', start:95,  cur:92,  goal:78, unit:'kg', lower:true,  week:'-0,4'},
    {nm:'Gordura visceral',ic:'🫃', start:16,  cur:14,  goal:9,  unit:'',   lower:true,  week:'-0'},
    {nm:'Cintura',         ic:'📏', start:110, cur:104, goal:88, unit:'cm', lower:true,  week:'-0,5'},
    {nm:'% Gordura',       ic:'💧', start:31,  cur:28,  goal:18, unit:'%',  lower:true,  week:'-0,2'},
    {nm:'Massa magra',     ic:'💪', start:60,  cur:62,  goal:66, unit:'kg', lower:false, week:'+0,1'},
  ],
  workout:{ nm:'Full Body em casa · sem equipamento', min:25, done:false, ex:[
    {nm:'Aquecimento (polichinelo)', s:'2× 40s'}, {nm:'Agachamento livre', s:'3× 15'},
    {nm:'Flexão de braço', s:'3× 10'}, {nm:'Afundo (cada perna)', s:'3× 12'},
    {nm:'Prancha', s:'3× 40s'}, {nm:'Abdominal', s:'3× 20'},
  ]},
  recipes:[
    {nm:'Omelete de ovos + brócolis', has:['🥚','🥦','🧀'], kcal:280, prot:24, tag:'💪 massa'},
    {nm:'Frango grelhado + arroz',    has:['🍗','🍚','🫒'], kcal:430, prot:38, tag:'💪 massa'},
    {nm:'Panqueca proteica de aveia', has:['🥚','🥛'],      kcal:310, prot:22, tag:'🔥 queima'},
    {nm:'Feijão + frango desfiado',   has:['🫘','🍗'],      kcal:390, prot:34, tag:'💪 massa'},
  ],
  quests:[
    {t:'Beber 3L de água',       rw:'+2 Corpo',     done:true},
    {t:'Treino de hoje',         rw:'+3 Corpo',     done:false},
    {t:'Bater a meta de proteína',rw:'+2 Corpo',    done:false},
    {t:'10 mil passos',          rw:'+2 Disciplina',done:false},
    {t:'Passear com os cães',    rw:'+2 Vínculos',  done:false},
  ],
  boss:{ nm:'Gordura Visceral', face:'🫃', hp:70, sub:'Nível 14 → meta 9. Treino + dieta tiram HP dela.' },
  mood:{ today:2, week:[
    {d:'Seg',v:5},{d:'Ter',v:7},{d:'Qua',v:6},{d:'Qui',v:8},{d:'Sex',v:4},{d:'Sáb',v:8},{d:'Dom',v:7}
  ]},
};
// escala de humor: índice 0..4
const MOODS=['😫','😕','😐','🙂','😄'];
const moodEmoji=v=>MOODS[Math.max(0,Math.min(4,Math.round((v-1)/2.25)))]; // 1..10 -> emoji

/* ============================================================ render */
const grid=document.getElementById('grid');
const pct=v=>Math.round(v*10);
function panel(cls,icon,title,right,body){
  return `<section class="panel ${cls}">
    <div class="ph"><span class="ic">${icon}</span><h2>${title}</h2>${right?`<span class="r">${right}</span>`:''}</div>
    ${body}</section>`;
}
function bar(v,c){ return `<div class="bar"><i data-w="${pct(v)}%" style="background:linear-gradient(90deg,${c}99,${c})"></i></div>`; }

/* personagem + atributos */
const h=STATE.hero;
const attrsHtml=STATE.attrs.map(a=>`
  <div class="attr"><div class="top"><b>${a.ic} ${a.n}</b><span>${a.v}/10</span></div>${bar(a.v,a.c)}</div>`).join('');
const heroBody=`
  <div class="hero">
    <div class="avatar">${h.avatar}</div>
    <div class="who">
      <div style="display:flex;align-items:center;gap:8px"><span class="name">${h.name}</span><span class="lvl">Nv ${h.level}</span></div>
      <div class="cls">${h.cls}</div>
      <div class="xp"><i data-w="${Math.round(h.xp/h.xpMax*100)}%"></i></div>
      <div class="xp-lbl"><span>XP</span><span>${h.xp}/${h.xpMax}</span></div>
    </div>
  </div>
  <div class="attrs">${attrsHtml}</div>`;

/* ouro */
const g=STATE.gold;
const goldBody=`<div class="gold-big">🪙 ${g.amount.toLocaleString('pt-BR')}</div>
  <div class="sub" style="margin-top:6px">Renda: ${g.renda}</div>
  <div class="sub" style="color:var(--hp)">${g.delta}</div>`;

/* missões */
const questBody=`<div id="quests">`+STATE.quests.map((q,i)=>`
  <div class="quest ${q.done?'done':''}" data-i="${i}">
    <div class="box">${q.done?'✔':''}</div><div class="txt">${q.t}</div><div class="rw">${q.rw}</div>
  </div>`).join('')+`</div>`;

/* cachorros */
const dogsBody=STATE.dogs.map(d=>`
  <div class="dog"><div class="face">${d.face}</div><div class="info">
    <div class="nm">${d.nm}</div>
    <div class="mini"><span class="k">🍖 Fome</span>${bar(d.fome,'#ff9f5b')}</div>
    <div class="mini"><span class="k">⚡ Energia</span>${bar(d.energia,'#5bb8ff')}</div>
    <div class="mini"><span class="k">😊 Feliz</span>${bar(d.feliz,'#54d98c')}</div>
  </div></div>`).join('');

/* cômodos */
const roomsBody=`<div class="rooms">`+STATE.rooms.map(r=>`
  <div class="room"><div class="ic">${r.ic}</div><div class="nm">${r.nm}</div>${bar(r.v,'#7ee0d0')}</div>`).join('')+`</div>`;

/* inventário */
let invHtml='';
for(let i=0;i<STATE.invSlots;i++){ const it=STATE.inv[i];
  invHtml+= it?`<div class="slot">${it.ic}${it.q?`<span class="q">${it.q}</span>`:''}</div>`:`<div class="slot empty">+</div>`; }
const invBody=`<div class="inv">${invHtml}</div>`;

/* geladeira / despensa */
const listBody=arr=>`<div class="list">`+arr.map(it=>`
  <div class="li"><span class="ic">${it.ic}</span><span>${it.nm}</span>${it.q?`<span class="q">${it.q}</span>`:''}</div>`).join('')+`</div>`;

/* eletrodomésticos (com status) */
const applBody=`<div class="list">`+STATE.appliances.map(a=>`
  <div class="li"><span class="ic">${a.ic}</span><span>${a.nm}</span>
    <span class="sdot" title="${a.ok?'ok':'precisa de atenção'}" style="background:${a.ok?'var(--hp)':'var(--dmg)'};box-shadow:0 0 8px ${a.ok?'var(--hp)':'var(--dmg)'}"></span></div>`).join('')+`</div>`;

/* lista de compras (clicável) */
const shopBody=`<div id="shop">`+STATE.shopping.map((s,i)=>`
  <div class="quest ${s.done?'done':''}" data-i="${i}"><div class="box">${s.done?'✔':''}</div><div class="txt">${s.t}</div></div>`).join('')+`</div>`;

/* medidas & progresso */
const measPct=m=> Math.max(0,Math.min(100, Math.round((m.start-m.cur)/(m.start-m.goal)*100)));
const measBody=STATE.measures.map(m=>`
  <div class="meas"><span class="ic">${m.ic}</span><div class="mid">
    <div class="nm"><span>${m.nm}</span><span class="cur"><b>${m.cur}${m.unit}</b> <span class="g">→ ${m.goal}${m.unit}</span></span></div>
    <div class="bar"><i data-w="${measPct(m)}%" style="background:linear-gradient(90deg,#54d98c99,#54d98c)"></i></div>
  </div><span class="wk">${m.week}</span></div>`).join('');

/* treino de hoje */
const w=STATE.workout;
const workoutBody=`<div class="wo">`+w.ex.map((x,i)=>`
  <div class="exi"><b style="color:var(--mut);font-family:ui-monospace,monospace">${i+1}</b><span>${x.nm}</span><span class="s">${x.s}</span></div>`).join('')+
  `</div><button class="wbtn ${w.done?'done':''}" id="woBtn">${w.done?'✅ Treino concluído':'💪 Concluir treino de hoje'}</button>`;

/* receitas com o que você tem */
const recBody=`<div class="recs">`+STATE.recipes.map(r=>`
  <div class="rec"><div class="rn">${r.nm}<span class="tag">${r.tag}</span></div>
    <div class="ing">${r.has.join(' ')}</div>
    <div class="mac"><span>${r.kcal} kcal</span><span>${r.prot}g proteína</span></div>
  </div>`).join('')+`</div>`;

/* humor */
const moodBody=`
  <div class="mtoday"><div class="big" id="moodBig">${MOODS[STATE.mood.today]}</div><div class="lbl">como você está hoje?</div></div>
  <div class="mpick" id="moodPick">${MOODS.map((e,i)=>`<button data-m="${i}" class="${i===STATE.mood.today?'on':''}">${e}</button>`).join('')}</div>
  <div class="mweek" style="margin-top:12px">${STATE.mood.week.map(d=>`
    <div class="mday"><div class="track"><div class="fill" data-h="${d.v*10}%"></div></div>
      <div class="e">${moodEmoji(d.v)}</div><div class="d">${d.d}</div></div>`).join('')}</div>`;

/* chefão */
const b=STATE.boss;
const bossBody=`<div class="boss"><div class="face2">${b.face}</div><div class="hpwrap">
  <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><b>${b.nm}</b><span class="sub">HP ${b.hp}%</span></div>
  ${bar(b.hp/10,'#ff6b6b')}
  <div class="sub" style="margin-top:6px">${b.sub}</div>
</div></div>`;

grid.innerHTML =
  panel('col-8','🧝','Personagem','', heroBody) +
  panel('col-4','🪙','Recursos','', goldBody) +
  panel('col-6','📊','Medidas & Progresso', STATE.goal, measBody) +
  panel('col-6','🏋️','Treino de hoje', w.min+' min · casa', workoutBody) +
  panel('col-12','🍽️','Receitas com o que você tem','pra sua meta', recBody) +
  panel('col-4','🙂','Humor da semana','', moodBody) +
  panel('col-4','🗺️','Missões de hoje','', questBody) +
  panel('col-4','🐉','Chefão atual','', bossBody) +
  panel('col-5','🐾','Meus cachorros','', dogsBody) +
  panel('col-7','🏠','Cômodos da casa','conservação', roomsBody) +
  panel('col-4','🧊','Geladeira', STATE.fridge.length+' itens', listBody(STATE.fridge)) +
  panel('col-4','🥫','Despensa', STATE.pantry.length+' itens', listBody(STATE.pantry)) +
  panel('col-4','🔌','Eletrodomésticos','', applBody) +
  panel('col-4','🛒','Lista de compras','', shopBody) +
  panel('col-4','🎒','Inventário', STATE.inv.length+' itens', invBody);

/* anima as barras (largura) e o humor (altura) ao carregar */
requestAnimationFrame(()=>requestAnimationFrame(()=>{
  document.querySelectorAll('[data-w]').forEach(el=>el.style.width=el.dataset.w);
  document.querySelectorAll('[data-h]').forEach(el=>el.style.height=el.dataset.h);
}));

/* checklists clicáveis (missões e compras) */
function bindChecklist(id, arr){ const box=document.getElementById(id); if(!box)return;
  box.addEventListener('click',e=>{ const q=e.target.closest('.quest'); if(!q)return; const i=+q.dataset.i;
    arr[i].done=!arr[i].done; q.classList.toggle('done'); q.querySelector('.box').textContent=arr[i].done?'✔':''; }); }
bindChecklist('quests', STATE.quests);
bindChecklist('shop', STATE.shopping);

/* botão de treino */
const woBtn=document.getElementById('woBtn');
if(woBtn) woBtn.onclick=()=>{ STATE.workout.done=!STATE.workout.done;
  woBtn.classList.toggle('done',STATE.workout.done);
  woBtn.textContent=STATE.workout.done?'✅ Treino concluído':'💪 Concluir treino de hoje'; };

/* seletor de humor de hoje */
const moodPick=document.getElementById('moodPick');
if(moodPick) moodPick.addEventListener('click',e=>{ const btn=e.target.closest('button'); if(!btn)return;
  STATE.mood.today=+btn.dataset.m;
  moodPick.querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===btn));
  document.getElementById('moodBig').textContent=MOODS[STATE.mood.today]; });

/* relógio + dia */
function tick(){ const d=new Date();
  document.getElementById('clock').textContent=d.toLocaleTimeString('pt-BR'); }
tick(); setInterval(tick,1000);
</script>
</body>
</html>
