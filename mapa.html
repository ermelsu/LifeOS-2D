<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeOS · Mapa da Casa</title>
<style>
  :root{ --bg:#0c0e16; --card:#161a28; --card2:#1b2032; --line:#2a3146; --ink:#e9ecf6; --mut:#8b93aa;
    --acc:#ffc94d; --acc-ink:#241802; --ok:#54d98c; --dmg:#ff6b6b; color-scheme:dark; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--bg); color:var(--ink); font-family:"Segoe UI",system-ui,sans-serif; min-height:100vh; padding:14px; }
  .app{ max-width:1200px; margin:0 auto; }
  .top{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:14px; }
  .top .brand{ font-weight:900; letter-spacing:2px; color:var(--acc); font-size:20px; }
  .top .sp{ flex:1; }
  a.back{ color:var(--mut); text-decoration:none; font-size:13px; } a.back:hover{ color:var(--ink); }
  .btn{ background:#232a3d; color:var(--ink); border:1px solid var(--line); border-radius:10px; padding:9px 14px; font:inherit; font-size:13px; cursor:pointer; }
  .btn:hover{ background:#2c3348; } .btn.primary{ background:var(--acc); color:var(--acc-ink); font-weight:800; border-color:var(--acc); }
  .btn.danger{ color:#ffb3b3; }
  .wrap{ display:grid; grid-template-columns:1fr 300px; gap:14px; }
  @media(max-width:820px){ .wrap{ grid-template-columns:1fr; } }
  .stage{ background:var(--card); border:1px solid var(--line); border-radius:16px; padding:12px; }
  .mapbox{ position:relative; border-radius:12px; overflow:hidden; background:#0f1320 repeating-linear-gradient(45deg,#0f1320,#0f1320 12px,#11162400 12px,#11162400 24px);
    min-height:340px; display:flex; align-items:center; justify-content:center; }
  .mapbox img{ display:block; width:100%; height:auto; }
  .empty{ color:var(--mut); text-align:center; padding:40px 20px; font-size:14px; }
  .pin{ position:absolute; transform:translate(-50%,-100%); cursor:pointer; text-align:center; }
  .pin .head{ width:26px; height:26px; border-radius:50% 50% 50% 0; transform:rotate(-45deg); border:2px solid #0008;
    display:flex; align-items:center; justify-content:center; box-shadow:0 4px 8px #0007; }
  .pin .head span{ transform:rotate(45deg); font-size:12px; font-weight:800; color:#0a0a0a; }
  .pin.todo .head{ background:var(--acc); } .pin.done .head{ background:var(--ok); }
  .side{ background:var(--card); border:1px solid var(--line); border-radius:16px; padding:14px; }
  .side h2{ font-size:14px; text-transform:uppercase; letter-spacing:.5px; color:#cdd4e6; margin-bottom:6px; }
  .hint{ color:var(--mut); font-size:12px; margin-bottom:12px; }
  .task{ display:flex; gap:9px; align-items:flex-start; padding:9px 6px; border-bottom:1px dashed #232a3d; }
  .task:last-child{ border-bottom:none; }
  .task .num{ width:22px; height:22px; border-radius:50%; background:var(--acc); color:#0a0a0a; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center; flex:0 0 auto; }
  .task.done .num{ background:var(--ok); } .task.done .t{ text-decoration:line-through; color:var(--mut); }
  .task .t{ flex:1; font-size:13px; } .task .x{ cursor:pointer; color:var(--mut); } .task .x:hover{ color:var(--dmg); }
  .task .ck{ cursor:pointer; }
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <span class="brand">🗺️ MAPA DA CASA</span>
    <span class="sp"></span>
    <a class="back" href="painel.html">← voltar ao painel</a>
    <label class="btn primary" style="cursor:pointer">⬆️ Subir imagem<input type="file" id="file" accept="image/*" hidden></label>
    <button class="btn danger" id="clear">Limpar</button>
  </div>

  <div class="wrap">
    <div class="stage">
      <div class="mapbox" id="mapbox">
        <div class="empty" id="empty">Suba a planta ou uma foto da sua casa.<br><br>Depois <b>clique num ponto do mapa</b> pra marcar uma tarefa (ex: “organizar o canil”).</div>
      </div>
    </div>
    <div class="side">
      <h2>Tarefas no mapa</h2>
      <div class="hint">Clique no mapa pra adicionar. Clique no número pra concluir.</div>
      <div id="tasks"></div>
    </div>
  </div>
</div>

<script>
  const KEY='lifeos_mapa';
  let data=JSON.parse(localStorage.getItem(KEY)||'{"img":null,"pins":[]}');
  const mapbox=document.getElementById('mapbox'), empty=document.getElementById('empty'), tasksEl=document.getElementById('tasks');
  let imgEl=null;

  function saveData(){ localStorage.setItem(KEY,JSON.stringify(data)); }
  function renderImg(){
    if(imgEl){ imgEl.remove(); imgEl=null; }
    if(data.img){ empty.style.display='none'; imgEl=document.createElement('img'); imgEl.src=data.img; mapbox.appendChild(imgEl); }
    else { empty.style.display=''; }
  }
  function renderPins(){
    mapbox.querySelectorAll('.pin').forEach(p=>p.remove());
    data.pins.forEach((p,i)=>{ const el=document.createElement('div'); el.className='pin '+(p.done?'done':'todo');
      el.style.left=p.x+'%'; el.style.top=p.y+'%';
      el.innerHTML=`<div class="head"><span>${i+1}</span></div>`;
      el.title=p.t; el.onclick=(e)=>{ e.stopPropagation(); p.done=!p.done; saveData(); renderAll(); };
      mapbox.appendChild(el); });
  }
  function renderTasks(){
    tasksEl.innerHTML = data.pins.length? '' : '<div class="hint">Nenhuma tarefa ainda.</div>';
    data.pins.forEach((p,i)=>{ const d=document.createElement('div'); d.className='task '+(p.done?'done':'');
      d.innerHTML=`<div class="num ck">${i+1}</div><div class="t">${p.t}</div><div class="x">✕</div>`;
      d.querySelector('.ck').onclick=()=>{ p.done=!p.done; saveData(); renderAll(); };
      d.querySelector('.x').onclick=()=>{ data.pins.splice(i,1); saveData(); renderAll(); };
      tasksEl.appendChild(d); });
  }
  function renderAll(){ renderImg(); renderPins(); renderTasks(); }

  document.getElementById('file').onchange=e=>{ const f=e.target.files[0]; if(!f)return;
    const r=new FileReader(); r.onload=()=>{ data.img=r.result; saveData(); renderAll(); }; r.readAsDataURL(f); };

  mapbox.addEventListener('click',e=>{
    if(!data.img) return; // só marca sobre o mapa
    const b=mapbox.getBoundingClientRect();
    const x=((e.clientX-b.left)/b.width*100), y=((e.clientY-b.top)/b.height*100);
    const t=prompt('O que precisa ser feito aqui?'); if(!t) return;
    data.pins.push({x:+x.toFixed(1), y:+y.toFixed(1), t, done:false}); saveData(); renderAll();
  });
  document.getElementById('clear').onclick=()=>{ if(confirm('Limpar mapa e tarefas?')){ data={img:null,pins:[]}; saveData(); renderAll(); } };

  renderAll();
</script>
</body>
</html>
