<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeOS · Mapa da Casa</title>
<style>
  :root{ --bg:#0c0e16; --card:#161a28; --card2:#1b2032; --line:#2a3146; --ink:#e9ecf6; --mut:#8b93aa;
    --acc:#ffc94d; --acc-ink:#241802; --ok:#54d98c; --dmg:#ff6b6b; color-scheme:dark; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--bg); color:var(--ink); font-family:"Segoe UI",system-ui,sans-serif; min-height:100vh; padding:12px; }
  .app{ max-width:1200px; margin:0 auto; }
  .top{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
  .top .brand{ font-weight:900; letter-spacing:1px; color:var(--acc); font-size:19px; } .top .sp{ flex:1; }
  a.back{ color:var(--mut); text-decoration:none; font-size:13px; } a.back:hover{ color:var(--ink); }
  .toolbar{ display:flex; gap:7px; flex-wrap:wrap; align-items:center; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:8px; margin-bottom:12px; }
  .tool{ background:var(--card2); border:2px solid var(--line); color:var(--ink); border-radius:10px; padding:8px 12px; font:inherit; font-size:13px; cursor:pointer; }
  .tool.on{ border-color:var(--acc); background:#2a2617; color:var(--acc); }
  .sp2{ flex:1; } .btn{ background:#232a3d; color:var(--ink); border:1px solid var(--line); border-radius:10px; padding:8px 12px; font:inherit; font-size:13px; cursor:pointer; } .btn.danger{ color:#ffb3b3; }
  .hintbar{ color:var(--mut); font-size:12px; margin:-4px 2px 10px; }

  .wrap{ display:grid; grid-template-columns:1fr 300px; gap:12px; }
  @media(max-width:860px){ .wrap{ grid-template-columns:1fr; } }
  .stage{ background:var(--card); border:1px solid var(--line); border-radius:16px; padding:10px; }
  .mapbox{ position:relative; width:100%; aspect-ratio:10/7; border-radius:12px; overflow:hidden; touch-action:none; background:#0f1320; }
  .mapbox canvas{ position:absolute; inset:0; width:100%; height:100%; touch-action:none; }
  .areaform{ position:absolute; z-index:6; background:var(--card2); border:1px solid var(--acc); border-radius:12px; padding:10px; width:230px; box-shadow:0 12px 30px #0009; }
  .areaform input,.areaform textarea{ width:100%; background:#0f1320; border:1px solid var(--line); color:var(--ink); border-radius:8px; padding:8px; font:inherit; font-size:13px; margin-bottom:7px; }
  .areaform textarea{ min-height:70px; resize:vertical; } .areaform .r{ display:flex; gap:7px; }
  .areaform .r button{ flex:1; border:none; border-radius:8px; padding:9px; font-weight:700; cursor:pointer; }
  .areaform .ok{ background:var(--acc); color:var(--acc-ink); } .areaform .no{ background:#33384a; color:var(--ink); }

  .side{ background:var(--card); border:1px solid var(--line); border-radius:16px; padding:14px; }
  .side h2{ font-size:14px; text-transform:uppercase; letter-spacing:.5px; color:#cdd4e6; margin-bottom:6px; }
  .hint{ color:var(--mut); font-size:12px; margin-bottom:12px; }
  .zone{ background:var(--card2); border:1px solid var(--line); border-radius:12px; padding:10px; margin-bottom:10px; }
  .zone .zh{ display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .zone .dot{ width:12px; height:12px; border-radius:4px; } .zone .nm{ font-weight:700; font-size:14px; } .zone .x{ margin-left:auto; color:var(--mut); cursor:pointer; } .zone .x:hover{ color:var(--dmg); }
  .zt{ display:flex; align-items:center; gap:8px; padding:5px 2px; font-size:13px; cursor:pointer; }
  .zt .box{ width:16px; height:16px; border:2px solid var(--line); border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:10px; flex:0 0 auto; }
  .zt.done .box{ background:var(--ok); border-color:var(--ok); color:#06210f; } .zt.done span{ text-decoration:line-through; color:var(--mut); }
  .addt{ display:flex; gap:6px; margin-top:6px; } .addt input{ flex:1; background:#0f1320; border:1px solid var(--line); color:var(--ink); border-radius:7px; padding:6px 8px; font:inherit; font-size:12px; } .addt button{ background:#2a3446; border:1px solid var(--line); color:var(--ink); border-radius:7px; padding:0 10px; cursor:pointer; }
</style>
</head>
<body>
<div class="app">
  <div class="top"><span class="brand">🗺️ MAPA DA CASA</span><span class="sp"></span><a class="back" href="painel.html">← voltar ao painel</a></div>

  <div class="toolbar">
    <button class="tool on" data-tool="block">🟦 Bloco</button>
    <button class="tool" data-tool="erase">🧽 Borracha</button>
    <button class="tool" data-tool="area">🏷️ Definir área</button>
    <span class="sp2"></span>
    <button class="btn danger" id="clear">Limpar tudo</button>
  </div>
  <div class="hintbar" id="hintbar">🟦 Arraste pra desenhar blocos da casa · 🧽 apaga pedaços · 🏷️ arraste sobre uma parte pra criar uma área com tarefas.</div>

  <div class="wrap">
    <div class="stage"><div class="mapbox" id="mapbox"><canvas id="cv" width="800" height="560"></canvas></div></div>
    <div class="side">
      <h2>Áreas & tarefas</h2>
      <div class="hint">O que estiver com tarefa pendente aparece como <b>desorganizado</b> no painel.</div>
      <div id="zones"></div>
    </div>
  </div>
</div>

<script>
  const KEY='lifeos_mapa';
  const GW=40, GH=28;                          // grade
  const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
  const CS=cv.width/GW;                         // tamanho da célula em px do canvas (20)
  const mapbox=document.getElementById('mapbox'), zonesEl=document.getElementById('zones'), hintbar=document.getElementById('hintbar');
  const PAL=['#ffc94d','#54d98c','#5bb8ff','#ff6b6b','#b98cff','#ff9f5b','#7ee0d0','#ff8fd0'];

  let S=JSON.parse(localStorage.getItem(KEY)||'null');
  if(!S || !S.built || S.built.length!==GW*GH){ S={ built:Array(GW*GH).fill(0), zones:[] }; }
  S.zones=S.zones||[];
  const save=()=>localStorage.setItem(KEY,JSON.stringify(S));
  const bidx=(c,r)=>r*GW+c, inb=(c,r)=>c>=0&&c<GW&&r>=0&&r<GH;

  let tool='block', drag=null, form=null;
  document.querySelectorAll('.tool').forEach(b=>b.onclick=()=>{ tool=b.dataset.tool;
    document.querySelectorAll('.tool').forEach(x=>x.classList.toggle('on',x===b)); });

  function cellOf(e){ const r=cv.getBoundingClientRect();
    return { c:Math.floor((e.clientX-r.left)/r.width*GW), r:Math.floor((e.clientY-r.top)/r.height*GH),
             px:(e.clientX-r.left)/r.width*100, py:(e.clientY-r.top)/r.height*100 }; }
  function norm(a,b){ return { x:Math.min(a.c,b.c), y:Math.min(a.r,b.r), w:Math.abs(a.c-b.c)+1, h:Math.abs(a.r-b.r)+1 }; }

  cv.addEventListener('pointerdown',e=>{ e.preventDefault(); if(form) return; const cl=cellOf(e); cv.setPointerCapture(e.pointerId);
    if(tool==='erase'){ drag={mode:'erase'}; eraseAt(cl); }
    else { drag={mode:tool, a:cl, b:cl }; }
    render();
  });
  cv.addEventListener('pointermove',e=>{ if(!drag)return; const cl=cellOf(e);
    if(drag.mode==='erase') eraseAt(cl); else { drag.b=cl; } render(); });
  cv.addEventListener('pointerup',e=>{ if(!drag)return; const d=drag; drag=null;
    if(d.mode==='block'){ const R=norm(d.a,d.b); for(let r=R.y;r<R.y+R.h;r++)for(let c=R.x;c<R.x+R.w;c++) if(inb(c,r)) S.built[bidx(c,r)]=1; save(); render(); }
    else if(d.mode==='area'){ const R=norm(d.a,d.b); openAreaForm(R); }
    else if(d.mode==='erase'){ save(); render(); }
  });
  function eraseAt(cl){ for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){ const c=cl.c+dc,r=cl.r+dr; if(inb(c,r)) S.built[bidx(c,r)]=0; } }

  function openAreaForm(R){
    if(form) form.remove();
    const d=document.createElement('div'); d.className='areaform';
    const left=Math.min(72, R.x/GW*100); d.style.left=left+'%'; d.style.top=Math.min(60,(R.y+R.h)/GH*100)+'%';
    d.innerHTML=`<input id="an" placeholder="nome da área (ex: Canil)">
      <textarea id="at" placeholder="tarefas típicas (uma por linha):\nvarrer\ntrocar água\nrecolher fezes"></textarea>
      <div class="r"><button class="no" id="acancel">cancelar</button><button class="ok" id="acreate">criar área</button></div>`;
    mapbox.appendChild(d); form=d; d.querySelector('#an').focus();
    d.querySelector('#acancel').onclick=()=>{ d.remove(); form=null; render(); };
    d.querySelector('#acreate').onclick=()=>{
      const nm=d.querySelector('#an').value.trim()||'Área';
      const tasks=d.querySelector('#at').value.split('\n').map(s=>s.trim()).filter(Boolean).map(t=>({t,done:false}));
      S.zones.push({ ...R, name:nm, color:PAL[S.zones.length%PAL.length], tasks });
      save(); d.remove(); form=null; render(); renderZones();
    };
  }

  function render(){
    ctx.clearRect(0,0,cv.width,cv.height);
    // blocos construídos
    for(let r=0;r<GH;r++)for(let c=0;c<GW;c++){ if(!S.built[bidx(c,r)])continue;
      ctx.fillStyle='#2f3d4a'; ctx.fillRect(c*CS,r*CS,CS,CS);
      ctx.fillStyle='#3a4a58'; ctx.fillRect(c*CS,r*CS,CS,2); }
    // grade
    ctx.strokeStyle='rgba(255,255,255,.05)'; ctx.lineWidth=1;
    for(let c=0;c<=GW;c++){ ctx.beginPath(); ctx.moveTo(c*CS+.5,0); ctx.lineTo(c*CS+.5,cv.height); ctx.stroke(); }
    for(let r=0;r<=GH;r++){ ctx.beginPath(); ctx.moveTo(0,r*CS+.5); ctx.lineTo(cv.width,r*CS+.5); ctx.stroke(); }
    // áreas
    S.zones.forEach(z=>{ const pend=z.tasks.filter(t=>!t.done).length;
      ctx.fillStyle=z.color+'33'; ctx.fillRect(z.x*CS,z.y*CS,z.w*CS,z.h*CS);
      ctx.strokeStyle=z.color; ctx.lineWidth=2; ctx.strokeRect(z.x*CS+1,z.y*CS+1,z.w*CS-2,z.h*CS-2);
      ctx.fillStyle=z.color; ctx.font='bold 12px system-ui'; ctx.fillText(z.name, z.x*CS+5, z.y*CS+15);
      if(pend>0){ ctx.font='11px system-ui'; ctx.fillStyle='#0a0a0a'; ctx.fillStyle=z.color;
        ctx.fillText('👾 '+pend, z.x*CS+5, z.y*CS+29); }
    });
    // preview do arrasto
    if(drag && (drag.mode==='block'||drag.mode==='area')){ const R=norm(drag.a,drag.b);
      ctx.fillStyle=drag.mode==='area'?'#ffc94d33':'#5bb8ff33'; ctx.fillRect(R.x*CS,R.y*CS,R.w*CS,R.h*CS);
      ctx.strokeStyle=drag.mode==='area'?'#ffc94d':'#5bb8ff'; ctx.lineWidth=2; ctx.strokeRect(R.x*CS,R.y*CS,R.w*CS,R.h*CS); }
  }

  function renderZones(){
    if(!S.zones.length){ zonesEl.innerHTML='<div class="hint">Nenhuma área ainda. Use 🏷️ pra criar.</div>'; return; }
    zonesEl.innerHTML='';
    S.zones.forEach((z,zi)=>{ const el=document.createElement('div'); el.className='zone';
      el.innerHTML=`<div class="zh"><span class="dot" style="background:${z.color}"></span><span class="nm">${z.name}</span><span class="x" title="excluir área">✕</span></div>
        <div class="tks"></div>
        <div class="addt"><input placeholder="+ nova tarefa"><button>+</button></div>`;
      const tks=el.querySelector('.tks');
      z.tasks.forEach((t,ti)=>{ const d=document.createElement('div'); d.className='zt '+(t.done?'done':'');
        d.innerHTML=`<div class="box">${t.done?'✔':''}</div><span>${t.t}</span>`;
        d.onclick=()=>{ t.done=!t.done; save(); renderZones(); render(); }; tks.appendChild(d); });
      el.querySelector('.x').onclick=()=>{ S.zones.splice(zi,1); save(); renderZones(); render(); };
      const inp=el.querySelector('.addt input'), addb=el.querySelector('.addt button');
      const add=()=>{ const v=inp.value.trim(); if(!v)return; z.tasks.push({t:v,done:false}); inp.value=''; save(); renderZones(); render(); };
      addb.onclick=add; inp.onkeydown=e=>{ if(e.key==='Enter')add(); };
      zonesEl.appendChild(el);
    });
  }

  document.getElementById('clear').onclick=()=>{ if(confirm('Apagar toda a planta e as áreas?')){ S={built:Array(GW*GH).fill(0),zones:[]}; save(); render(); renderZones(); } };

  render(); renderZones();
</script>
</body>
</html>
